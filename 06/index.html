<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项示例</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="app">
        <section class="panel">
            <p class="eyebrow">Example 06</p>
            <h1>待办事项列表</h1>
            <p class="intro">这一版先练最核心的流程：输入、添加、切换完成、删除、重新渲染。</p>

            <section class="composer">
                <input
                    id="todoInput"
                    type="text"
                    placeholder="输入一条待办事项"
                >
                <button id="addBtn" type="button">添加事项</button>
            </section>

            <p id="summaryText" class="summary">当前一共有 0 条待办</p>
            <p id="statusText" class="status" data-state="default">先添加一条待办试试。</p>

            <ul id="todoList" class="todo-list"></ul>
        </section>
    </main>

    <script type="module" src="./index.js"></script>
</body>
</html>
